<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#050505"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#g)"/>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1" fill="rgba(255,255,255,.06)"/>
    </pattern>
    <filter id="g"><feTurbulence type="fractalNoise" baseFrequency=".6" numOctaves="3" stitchTiles="stitch"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <text x="80" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="160" font-weight="200" fill="#f5f0eb" letter-spacing="-4">Código,</text>
  <text x="80" y="520" font-family="system-ui,-apple-system,sans-serif" font-size="160" font-weight="800" fill="#f5f0eb" letter-spacing="-4">
    <tspan fill="url(#gg)">segurança</tspan>
  </text>
  <text x="80" y="660" font-family="system-ui,-apple-system,sans-serif" font-size="160" font-weight="800" fill="transparent" stroke="#f5f0eb" stroke-width="2" letter-spacing="-4">&amp; automação.</text>
  <text x="80" y="90" font-family="monospace" font-size="28" fill="rgba(245,240,235,.5)" letter-spacing="-1">Over</text>
  <defs>
    <linearGradient id="gg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="rgba(245,240,235,.4)"/>
    </linearGradient>
  </defs>
</svg>
